<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Hello World · pocket-cache</title>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #080a0c;
      color: #eef1eb;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    main {
      width: min(88vw, 520px);
      padding: 28px;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 22px;
      background: linear-gradient(180deg, #1d252b, #14191d);
      box-shadow: 0 16px 48px rgba(0,0,0,.35);
    }
    p { color: #a4aeac; line-height: 1.5; }
    .ok { color: #47dc7d; font-weight: 800; }
  </style>
</head>
<body>
  <main>
    <p class="ok">LOCAL SERVER ONLINE</p>
    <h1>Hello World</h1>
    <p>This page is being served directly from pocket-cache over its local Wi‑Fi network.</p>
    <p>No internet connection is required.</p>
  </main>
</body>
</html>
